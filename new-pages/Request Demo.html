<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qntify · Request a Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;background:#f7f5f0;color:#1a1d24;font-family:Inter,sans-serif;-webkit-font-smoothing:antialiased}
  *{box-sizing:border-box}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;padding:0}
  input,select,textarea{font-family:inherit;color:inherit}

  /* ---------------- Top bar (matches site) ---------------- */
  .topbar{height:72px;display:flex;align-items:center;padding:0 48px;justify-content:space-between;border-bottom:1px solid rgba(20,20,30,0.10);background:#f7f5f0;position:sticky;top:0;z-index:30}
  .topbar img.logo{height:26px;width:auto;display:block;filter:brightness(0)}
  .topbar .nav-tag{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:2px;color:#4a4a44;text-transform:uppercase;display:inline-flex;align-items:center;gap:10px}
  .topbar .nav-tag::before{content:"";width:6px;height:6px;background:#4a5c9c;border-radius:50%}
  .crumbs{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:1.8px;color:#7a7366;text-transform:uppercase}
  .crumbs a:hover{color:#1a1d24}
  .crumbs span.sep{margin:0 10px;color:rgba(20,20,30,0.25)}

  /* ---------------- Page shell ---------------- */
  main.page{max-width:1400px;margin:0 auto;padding:0}

  /* ---------------- LAYOUT A : split (safe) ---------------- */
  .split{display:grid;grid-template-columns:minmax(0,1.05fr) minmax(0,1fr);min-height:calc(100vh - 72px);border-top:1px solid transparent}
  .split-left{padding:96px 64px 96px 48px;display:flex;flex-direction:column;justify-content:flex-start;gap:0;border-right:1px solid rgba(20,20,30,0.10);position:relative}
  .split-right{padding:96px 48px 96px 64px;background:#fbfaf6;display:flex;flex-direction:column;justify-content:flex-start}

  .eyebrow{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:2px;color:#7a7366;text-transform:uppercase;margin-bottom:24px;display:inline-flex;align-items:center;gap:12px}
  .eyebrow::after{content:"";width:40px;height:1px;background:rgba(20,20,30,0.20)}

  h1.headline{font-family:"IBM Plex Serif",Georgia,serif;font-weight:400;font-size:clamp(34px,3.6vw,52px);letter-spacing:-0.5px;line-height:1.06;margin:0 0 28px;max-width:620px;text-wrap:pretty}
  h1.headline em{font-style:italic;color:#4a5c9c}
  .lede{max-width:540px;font-size:16px;line-height:1.6;color:#4a4a44;margin:0 0 48px}

  /* what to expect block */
  .expect-list{display:flex;flex-direction:column;border-top:1px solid rgba(20,20,30,0.12);max-width:560px;margin-bottom:56px}
  .expect-row{display:grid;grid-template-columns:60px 1fr;gap:18px;padding:20px 0;border-bottom:1px solid rgba(20,20,30,0.12);align-items:start}
  .expect-row .num{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:1.5px;color:#4a5c9c;padding-top:3px}
  .expect-row .title{font-family:"IBM Plex Serif",Georgia,serif;font-size:18px;line-height:1.3;margin:0 0 6px}
  .expect-row .desc{font-size:13.5px;line-height:1.55;color:#4a4a44;margin:0}

  /* social proof */
  .proof{margin-top:auto;padding-top:32px;border-top:1px solid rgba(20,20,30,0.12);max-width:560px}
  .proof-eyebrow{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:2px;color:#7a7366;text-transform:uppercase;margin-bottom:20px}
  .proof-quote{font-family:"IBM Plex Serif",Georgia,serif;font-size:18px;line-height:1.4;font-style:italic;color:#1a1d24;margin:0 0 16px;text-wrap:pretty}
  .proof-attrib{font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:1.4px;color:#4a4a44;text-transform:uppercase}
  .proof-attrib b{color:#1a1d24;font-weight:500}
  .proof-clients{display:flex;flex-wrap:wrap;gap:18px 28px;margin-top:28px;padding-top:24px;border-top:1px dashed rgba(20,20,30,0.18)}
  .proof-clients span{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:1.5px;color:#7a7366;text-transform:uppercase}

  /* ---------- form card ---------- */
  .form-card{max-width:520px;width:100%;align-self:stretch}
  .form-card .form-eyebrow{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:2.5px;color:#4a5c9c;text-transform:uppercase;margin-bottom:18px;display:inline-flex;align-items:center;gap:10px}
  .form-card .form-eyebrow::before{content:"";width:6px;height:6px;background:#4a5c9c;border-radius:50%}
  .form-card h2{font-family:"IBM Plex Serif",Georgia,serif;font-weight:400;font-size:32px;line-height:1.1;letter-spacing:-0.3px;margin:0 0 12px}
  .form-card .form-sub{font-size:14px;line-height:1.55;color:#4a4a44;margin:0 0 36px;max-width:440px}

  .field{display:flex;flex-direction:column;margin-bottom:22px}
  .field label{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:1.8px;color:#4a4a44;text-transform:uppercase;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
  .field label .req{color:#4a5c9c}
  .field input,.field select{height:46px;padding:0 14px;background:#f7f5f0;border:1px solid rgba(20,20,30,0.18);font-size:15px;color:#1a1d24;outline:none;transition:border-color .15s ease,background .15s ease}
  .field input:focus,.field select:focus{border-color:#4a5c9c;background:#fff}
  .field input::placeholder{color:#a3a094}
  .field select{appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%231a1d24' stroke-width='1' fill='none'/></svg>");background-repeat:no-repeat;background-position:right 16px center;padding-right:36px}

  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:18px}

  .submit{margin-top:14px;width:100%;height:52px;background:#1a1d24;color:#fbfaf6;font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:14px;transition:background .18s ease}
  .submit:hover{background:#4a5c9c}
  .submit .arrow{display:inline-block;transition:transform .18s ease}
  .submit:hover .arrow{transform:translateX(4px)}

  .form-footnote{margin-top:22px;font-size:12.5px;line-height:1.55;color:#7a7366}
  .form-footnote a{color:#4a5c9c;border-bottom:1px solid rgba(74,92,156,0.4)}

  .meta-row{margin-top:36px;padding-top:24px;border-top:1px solid rgba(20,20,30,0.12);display:flex;justify-content:space-between;font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:1.5px;color:#7a7366;text-transform:uppercase}
  .meta-row b{color:#1a1d24;font-weight:500}

  /* ---------------- LAYOUT B : bold (full-bleed dark hero + floating form) ---------------- */
  .bold-hero{position:relative;background:#f7f5f0;color:#1a1d24;overflow:hidden;padding:0;border-bottom:1px solid rgba(20,20,30,0.10)}
  .bold-hero::before{content:"";position:absolute;inset:0;background-image:radial-gradient(circle at 20% 30%,rgba(74,92,156,0.10),transparent 45%),radial-gradient(circle at 80% 80%,rgba(74,92,156,0.06),transparent 55%);pointer-events:none}
  .bold-hero::after{content:"";position:absolute;inset:0;background-image:linear-gradient(to right,rgba(20,20,30,0.05) 1px,transparent 1px),linear-gradient(to bottom,rgba(20,20,30,0.05) 1px,transparent 1px);background-size:80px 80px;pointer-events:none;mask-image:linear-gradient(to bottom,#000 0%,transparent 90%);-webkit-mask-image:linear-gradient(to bottom,#000 0%,transparent 90%)}
  .bold-grid{position:relative;z-index:2;display:grid;grid-template-columns:minmax(0,1.05fr) minmax(0,1fr);gap:64px;max-width:1400px;margin:0 auto;padding:120px 48px 160px;align-items:start}

  .bold-left .eyebrow{color:#7a7366}
  .bold-left .eyebrow::after{background:rgba(20,20,30,0.20)}
  .bold-left h1.headline{color:#1a1d24;font-size:clamp(40px,4.4vw,64px);letter-spacing:-0.8px;line-height:1.02;margin-bottom:32px}
  .bold-left h1.headline em{color:#4a5c9c}
  .bold-left .lede{color:#4a4a44;font-size:17px;max-width:520px;margin-bottom:56px}

  .bold-left .expect-list{max-width:560px;border-top-color:rgba(20,20,30,0.18)}
  .bold-left .expect-list .expect-row{border-bottom-color:rgba(20,20,30,0.18)}
  .bold-left .expect-list .num{color:#4a5c9c}
  .bold-left .expect-list .title{color:#1a1d24}
  .bold-left .expect-list .desc{color:#4a4a44}

  .bold-proof{margin-top:56px;max-width:560px;border-top:1px solid rgba(20,20,30,0.14);padding-top:32px}
  .bold-proof .proof-eyebrow{color:#7a7366}
  .bold-proof .proof-quote{color:#1a1d24}
  .bold-proof .proof-attrib{color:#4a4a44}
  .bold-proof .proof-attrib b{color:#1a1d24}
  .bold-proof .proof-clients{border-top-color:rgba(20,20,30,0.14)}
  .bold-proof .proof-clients span{color:#7a7366}

  .bold-form-wrap{position:relative}
  .bold-form{background:#0f1a2e;color:#f7f5f0;padding:44px 44px 48px;border:1px solid rgba(255,255,255,0.08);box-shadow:0 30px 60px -20px rgba(15,26,46,0.35)}
  .bold-form h2{color:#fff}
  .bold-form .form-eyebrow{color:#cbd5e8}
  .bold-form .form-eyebrow::before{background:#cbd5e8;box-shadow:0 0 8px rgba(203,213,232,0.6)}
  .bold-form .form-sub{color:rgba(255,255,255,0.72)}
  .bold-form .field label{color:rgba(255,255,255,0.72)}
  .bold-form .field label .req{color:#cbd5e8}
  .bold-form .field input,.bold-form .field select{background-color:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.18);color:#fff}
  .bold-form .field select option{background:#0f1a2e;color:#fff}
  .bold-form .field select:invalid{color:rgba(255,255,255,0.4)}
  .bold-form .field input::placeholder{color:rgba(255,255,255,0.4)}
  .bold-form .field input:focus,.bold-form .field select:focus{border-color:#cbd5e8;background-color:rgba(255,255,255,0.10)}
  .bold-form .field select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='white' stroke-width='1' fill='none'/></svg>");background-repeat:no-repeat;background-position:right 16px center}
  .bold-form .submit{background:#f7f5f0;color:#0f1a2e}
  .bold-form .submit:hover{background:#cbd5e8;color:#0f1a2e}
  .bold-form .form-footnote{color:rgba(255,255,255,0.55)}
  .bold-form .form-footnote a{color:#cbd5e8;border-bottom-color:rgba(203,213,232,0.4)}
  .bold-form .meta-row{border-top-color:rgba(255,255,255,0.14);color:rgba(255,255,255,0.55)}
  .bold-form .meta-row b{color:#fff}

  /* ---------------- responsive ---------------- */
  @media (max-width:1080px){
    .split{grid-template-columns:1fr}
    .split-left{padding:64px 32px 56px;border-right:none;border-bottom:1px solid rgba(20,20,30,0.10)}
    .split-right{padding:64px 32px 96px}
    .form-card{max-width:none}
    .bold-grid{grid-template-columns:1fr;gap:48px;padding:80px 32px 100px}
  }
  @media (max-width:640px){
    .topbar{padding:0 24px;height:64px}
    .topbar img.logo{height:22px}
    .crumbs{display:none}
    .split-left,.split-right{padding:48px 24px}
    .field-row{grid-template-columns:1fr;gap:0}

    .bold-grid{padding:64px 24px 80px}
    .bold-form{padding:32px 24px 36px}
    h1.headline{font-size:34px !important}
  }

  /* tweaks panel offsets */
  .tweaks-launcher{position:fixed;bottom:20px;right:20px;z-index:50}
</style>
</head>
